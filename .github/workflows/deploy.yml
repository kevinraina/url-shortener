name: Build → ECR → Deploy to EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: url-shortener
  EKS_CLUSTER_NAME: url-shortener-cluster
  K8S_NAMESPACE: url-shortener

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── AWS credentials ────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Login to Amazon ECR ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ──────────────────────────────────────────
      - name: Build and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Update kubeconfig for EKS ──────────────────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # ── Deploy to EKS ──────────────────────────────────────────────────────
      - name: Deploy namespace & Redis
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/redis/

      - name: Deploy app with new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|url-shortener-app:latest|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
            kubernetes/app/deployment.yaml
          kubectl apply -f kubernetes/app/

      - name: Deploy monitoring stack
        run: |
          kubectl apply -f kubernetes/monitoring/

      # ── Verify rollout ─────────────────────────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/url-shortener \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      - name: Print service URL
        run: |
          echo "App LoadBalancer URL:"
          kubectl get svc url-shortener -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
