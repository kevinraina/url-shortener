apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: url-shortener-cluster
  region: us-east-1
  version: "1.32"

iam:
  withOIDC: true   # required for AWS Load Balancer Controller

managedNodeGroups:
  - name: app-nodes
    instanceType: t3.medium
    minSize: 2
    maxSize: 5
    desiredCapacity: 2
    volumeSize: 20
    labels:
      role: app
    tags:
      Project: url-shortener
      Environment: production

addons:
  - name: aws-ebs-csi-driver
  - name: coredns
  - name: kube-proxy
  - name: vpc-cni

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
